spring.application.name=add-to-cart-page

# ─────────────────────────────────────────────
# Database — uses Railway env vars in production,
#            falls back to localhost for local dev
# ─────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─────────────────────────────────────────────
# Email Configuration
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin Email (receives contact form messages)
admin.email=${ADMIN_EMAIL:your-admin-email@gmail.com}

# Frontend URL (for CORS — set this to your Vercel URL on Railway)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# ─────────────────────────────────────────────
# Server Port — Railway injects PORT automatically
# ─────────────────────────────────────────────
server.port=${PORT:8080}
